<!DOCTYPE html>
<html>
<head>
  <title>Games</title>
  <style>
    body { background: #111; color: white; font-family: sans-serif; text-align: center; }
    .game-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; padding: 20px; }
    .game-card { background: #222; padding: 12px; border-radius: 8px; cursor: pointer; width: 150px; }
    iframe { width: 100%; height: 500px; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Games</h1>
  <div class="game-grid">
    <div class="game-card" onclick="loadGame('GAME_URL_HERE')">Game Name</div>
  </div>
  <div id="game-container"></div>

  <script>
    function loadGame(url) {
      document.getElementById('game-container').innerHTML = 
        `<iframe src="${url}" allowfullscreen></iframe>`;
    }
  </script>
</body>
</html>
