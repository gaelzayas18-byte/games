<!DOCTYPE html>
<html>
<head>
  <title>Games</title>
  <style>
    body { background: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
    h1 { margin-bottom: 20px; }
    .game-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    .game-card { background: #222; padding: 16px; border-radius: 10px; cursor: pointer; width: 140px; transition: background 0.2s; }
    .game-card:hover { background: #333; }
    #game-container { margin-top: 24px; }
    iframe { width: 900px; max-width: 100%; height: 520px; border: none; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>🎮 Games</h1>
  <div class="game-grid">
    <div class="game-card" onclick="loadGame('https://www.crazygames.com/embed/moto-x3m')">Moto X3M</div>
    <div class="game-card" onclick="loadGame('https://www.crazygames.com/embed/slope-game')">Slope</div>
    <div class="game-card" onclick="loadGame('https://www.crazygames.com/embed/paper-io-2')">Paper.io 2</div>
  </div>
  <div id="game-container"></div>

  <script>
    function loadGame(url) {
      document.getElementById('game-container').innerHTML =
        `<iframe src="${url}" allowfullscreen></iframe>`;
      document.getElementById('game-container').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
